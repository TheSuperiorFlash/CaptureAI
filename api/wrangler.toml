# Cloudflare Workers Configuration
# Learn more: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "api"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Account ID - Get from: https://dash.cloudflare.com/ (right sidebar)
account_id = "e411f43b15c9122c0056a08f727eef15"

# Workers AI Gateway binding
# This automatically connects to your AI Gateway
[ai]
binding = "AI"

# D1 Database binding
# Creates a SQLite database at the edge
[[d1_databases]]
binding = "DB"
database_name = "captureai-db"
database_id = "8056a7db-be99-4c64-8316-daf6c5c9b48f"  # Created when you run: wrangler d1 create captureai-db

# Native Rate Limiting bindings (Cloudflare Rate Limiting API)
# https://developers.cloudflare.com/workers/runtime-apis/bindings/rate-limit/

[[ratelimits]]
name = "RATE_LIMITER_AUTH"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 5
  period = 60


[[ratelimits]]
name = "RATE_LIMITER_LICENSE"
namespace_id = "1003"

  [ratelimits.simple]
  limit = 10
  period = 60

[[ratelimits]]
name = "RATE_LIMITER_CHECKOUT"
namespace_id = "1004"

  [ratelimits.simple]
  limit = 10
  period = 60

[[ratelimits]]
name = "RATE_LIMITER_GLOBAL"
namespace_id = "1005"

  [ratelimits.simple]
  limit = 60
  period = 60

[[ratelimits]]
name = "RATE_LIMITER_AI_PRO"
namespace_id = "1006"

  [ratelimits.simple]
  limit = 20
  period = 60

# Environment Variables (Secrets)
# Set these with: wrangler secret put SECRET_NAME
[vars]
# Public variables (not sensitive)
CLOUDFLARE_ACCOUNT_ID = "e411f43b15c9122c0056a08f727eef15"
CLOUDFLARE_GATEWAY_NAME = "captureai-gateway"
BASIC_TIER_DAILY_LIMIT = "50"
PRO_TIER_RATE_LIMIT_PER_MINUTE = "20"  # 20 requests per minute for Pro tier
EXTENSION_URL = "https://captureai.dev"
# Chrome Extension IDs - Comma-separated list of allowed extension IDs
# First ID: Production extension from Chrome Web Store
# Second ID: Development/unpacked extension for testing
CHROME_EXTENSION_IDS = "idpdleplccjjbmdmjkpmmkecmoeomnjd,pnlbkbjpefcjfaidkmickcaicecbkdio"

# Cron triggers — daily cleanup of expired verification codes
[triggers]
crons = ["0 3 * * *"]

# Secrets - Set with: wrangler secret put SECRET_NAME
# Required secrets:
#   wrangler secret put STRIPE_SECRET_KEY
#   wrangler secret put STRIPE_WEBHOOK_SECRET
#   wrangler secret put STRIPE_PRICE_BASIC_WEEKLY      ← Basic $1.99/week
#   wrangler secret put STRIPE_PRICE_BASIC_MONTHLY     ← Basic $5.99/month
#   wrangler secret put STRIPE_PRICE_PRO_WEEKLY        ← Pro $3.49/week
#   wrangler secret put STRIPE_PRICE_PRO_MONTHLY       ← Pro $9.99/month
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put FROM_EMAIL
#   wrangler secret put ADMIN_KEY       ← protects GET /api/ai/total-usage (admin analytics endpoint)
# Recommended FROM_EMAIL format: CaptureAI <license@mail.captureai.dev>
# Note: Avoid "noreply" addresses for better deliverability