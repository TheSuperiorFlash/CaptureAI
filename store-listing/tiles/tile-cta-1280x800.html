<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>CaptureAI — CTA Tile (1280×800)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 1280px;
      height: 800px;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .tile {
      width: 1280px;
      height: 800px;
      background: #f4f6f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* subtle grid */
    .tile::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(33, 138, 255, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(33, 138, 255, 0.055) 1px, transparent 1px);
      background-size: 52px 52px;
    }

    /* center glow */
    .tile::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 900px;
      height: 700px;
      background: radial-gradient(ellipse at center, rgba(33, 138, 255, 0.08) 0%, transparent 65%);
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* Logo lockup */
    .brand-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 44px;
    }

    .brand-logo {
      width: 52px;
      height: 52px;
      border-radius: 22%;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(33, 138, 255, 0.35);
    }

    .brand-logo img {
      width: 52px;
      height: 52px;
    }

    .brand-name {
      font-size: 28px;
      font-weight: 700;
      color: #333333;
    }

    /* Headline */
    .headline {
      font-size: 80px;
      font-weight: 800;
      color: #1a1a1a;
      line-height: 1.08;
      letter-spacing: -2.5px;
      margin-bottom: 26px;
    }

    .headline em {
      font-style: normal;
      color: #218aff;
    }

    /* Sub */
    .subheadline {
      font-size: 22px;
      font-weight: 400;
      color: #555555;
      line-height: 1.6;
      max-width: 980px;
      margin-bottom: 52px;
    }

    .subheadline strong {
      color: #1a1a1a;
      font-weight: 600;
    }

    /* CTA button — matches marquee gradient */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(90deg, #2563eb 0%, #3b82f6 100%);
      color: #ffffff;
      font-size: 22px;
      font-weight: 700;
      padding: 20px 48px;
      border-radius: 14px;
      box-shadow: 0 8px 28px rgba(33, 138, 255, 0.4);
      letter-spacing: -0.3px;
      margin-bottom: 16px;
    }

    /* Shortcut hint */
    .shortcut-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 36px;
      font-size: 16px;
      color: #999999;
    }

    .kbd {
      display: inline-flex;
      align-items: center;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.10);
    }
  </style>
</head>

<body>
  <div class="tile">
    <div class="content">

      <div class="brand-row">
        <div class="brand-logo">
          <img src="../../website/public/logo.svg" alt="CaptureAI">
        </div>
        <span class="brand-name">CaptureAI</span>
      </div>

      <div class="headline">
        Screenshot any question.<br><em>Get exact the answer.</em>
      </div>

      <div class="subheadline">
        Students use CaptureAI to master complex topics, ace their exams,<br>
        and save hours of studying. <strong>Highlight any question</strong> on any<br>
        platform and get an accurate answer in seconds.
      </div>

      <div class="cta-btn">
        Get Started
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"></path>
          <path d="m12 5 7 7-7 7"></path>
        </svg>
      </div>

      <div class="shortcut-row">
        Press <span class="kbd">Ctrl</span>+<span class="kbd">Shift</span>+<span class="kbd">X</span> to capture your
        first question
      </div>

    </div>
  </div>
</body>

</html>
