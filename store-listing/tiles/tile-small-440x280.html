<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=440">
  <title>CaptureAI — Small Promo Tile (440×280)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 440px;
      height: 280px;
      overflow: hidden;
      background: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .tile {
      width: 440px;
      height: 280px;
      background: #ffffff;
      display: flex;
      align-items: stretch;
      position: relative;
      overflow: hidden;
    }

    /* Subtle background grid */
    .tile::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(33, 138, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(33, 138, 255, 0.04) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
    }

    /* ── LEFT SIDE: Copy ── */
    .copy-side {
      width: 220px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 28px 22px 28px 28px;
      position: relative;
      z-index: 2;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 20px;
    }

    .brand-logo {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-logo img {
      width: 26px;
      height: 26px;
    }

    .brand-name {
      font-size: 13px;
      font-weight: 700;
      color: #333333;
      letter-spacing: -0.2px;
    }

    .headline {
      font-size: 22px;
      font-weight: 700;
      color: #333333;
      line-height: 1.22;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    .headline em {
      font-style: normal;
      color: #218aff;
    }

    .subline {
      font-size: 12px;
      font-weight: 400;
      color: #666666;
      line-height: 1.5;
    }

    /* ── RIGHT SIDE: Floating panel mock ── */
    .panel-side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
      padding: 18px 18px 18px 8px;
    }

    /* Decorative blue glow behind the panel */
    .panel-side::before {
      content: '';
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 170px;
      height: 220px;
      background: radial-gradient(ellipse at center, rgba(33, 138, 255, 0.14) 0%, transparent 70%);
      pointer-events: none;
    }

    .floating-panel {
      width: 170px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow:
        0 8px 24px rgba(0, 0, 0, 0.12),
        0 0 0 1px rgba(0, 0, 0, 0.04);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
    }

    /* Panel header */
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .panel-brand {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .panel-logo {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel-logo img {
      width: 16px;
      height: 16px;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 700;
      color: #333333;
    }

    /* Mode toggle pill */
    .mode-toggle {
      width: 64px;
      height: 18px;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 100px;
      display: flex;
      align-items: center;
      position: relative;
      padding: 2px;
    }

    .toggle-thumb {
      width: 39px;
      height: 16px;
      background: #218aff;
      border-radius: 100px;
      position: absolute;
      left: 0px;
    }

    .toggle-label {
      position: relative;
      z-index: 1;
      flex: 1;
      text-align: center;
      font-size: 8px;
      font-weight: 600;
      line-height: 14px;
      margin-left: 2px;
    }

    .toggle-label.active {
      color: #fff;
    }

    .toggle-label.inactive {
      color: #999;
      margin-left: 4px;
    }

    .response-area {
      background: transparent;
      border: none;
      padding: 3px 0px;
      min-height: 38px;
      display: flex;
      flex-direction: column;
    }

    .response-label {
      font-size: 8px;
      font-weight: 600;
      color: #999999;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 4px;
    }

    .response-text {
      font-size: 9px;
      font-weight: 500;
      color: #333333;
      line-height: 1.4;
    }

    .response-text .highlight {
      color: #218aff;
      font-weight: 700;
    }

    /* Capture button */
    .btn-capture {
      height: 30px;
      background: #218aff;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      box-shadow: 0 4px 12px rgba(33, 138, 255, 0.3);
    }

    .btn-capture img {
      width: 12px;
      height: 12px;
    }

    .btn-capture-text {
      font-size: 10px;
      font-weight: 700;
      color: #ffffff;
    }

    /* Quick capture button */
    .btn-quick {
      height: 30px;
      background: rgba(0, 0, 0, 0.03);
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-quick-text {
      font-size: 9px;
      font-weight: 600;
      color: #333333;
    }
  </style>
</head>

<body>
  <div class="tile">

    <!-- LEFT: Copy -->
    <div class="copy-side">
      <div class="brand">
        <div class="brand-logo">
          <img src="../../website/public/logo.svg" alt="CaptureAI Logo">
        </div>
        <span class="brand-name">CaptureAI</span>
      </div>

      <h1 class="headline">Screenshot<br>any question.<br><em>Get the answer.</em></h1>
      <p class="subline">No tab-switching.<br>No copy-pasting. Just answers.</p>
    </div>

    <!-- RIGHT: Floating panel mockup -->
    <div class="panel-side">
      <div class="floating-panel">

        <!-- Header -->
        <div class="panel-header">
          <div class="panel-brand">
            <div class="panel-logo">
              <img src="../../website/public/logo.svg" alt="CaptureAI Logo">
            </div>
            <span class="panel-title">CaptureAI</span>
          </div>
          <div class="mode-toggle">
            <div class="toggle-thumb"></div>
            <span class="toggle-label active">Capture</span>
            <span class="toggle-label inactive">Ask</span>
          </div>
        </div>

        <!-- Response area -->
        <div class="response-area">
          <div class="response-text">The answer is <span class="highlight">B — The 13th Amendment</span>, which
            officially abolished slavery in the United States.</div>
        </div>

        <!-- Capture button -->
        <div class="btn-capture">
          <img src="../../website/public/camera.png" alt="Camera">
          <span class="btn-capture-text">Capture a Question</span>
        </div>

        <!-- Quick Capture -->
        <div class="btn-quick">
          <span class="btn-quick-text">Quick Capture</span>
        </div>

      </div>
    </div>

  </div>
</body>

</html>
