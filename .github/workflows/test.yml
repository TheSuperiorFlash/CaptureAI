name: Tests

on:
  push:
    paths:
      - 'tests/**'
      - 'config/jest.config.js'
      - 'tests/setup/**'
      - 'extension/**'
  pull_request:
    paths:
      - 'tests/**'
      - 'config/jest.config.js'
      - 'tests/setup/**'
      - 'extension/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
