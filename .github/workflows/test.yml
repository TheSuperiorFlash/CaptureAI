name: Tests

on:
  push:
    paths:
      - 'tests/**'
      - 'config/jest.config.js'
      - 'tests/setup/**'
      - 'extension/**'
      - 'api/**'
  pull_request:
    paths:
      - 'tests/**'
      - 'config/jest.config.js'
      - 'tests/setup/**'
      - 'extension/**'
      - 'api/**'

jobs:
  extension-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'api/package-lock.json'

      - name: Install backend dependencies
        run: cd api && npm ci

      - name: Run backend tests
        run: cd api && npm test
